name: Create Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read version from sentra.pl
        id: read_version
        run: |
          VERSION=$(perl -ne "if (/our \\$VERSION = '([^']+)'/) { print \$1; exit }" sentra.pl)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: Klemensas/action-autotag@stable
        with:
          version: ${{ steps.read_version.outputs.version }}
          tag_prefix: v
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
